<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Data Analyzer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 { color: #333; }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background-color: #45a049; }
        #result {
            margin-top: 20px;
            padding: 20px;
            background-color: white;
            border-radius: 5px;
            border: 1px solid #ddd;
            white-space: pre-wrap;
        }
        .loading { color: #888; }
    </style>
</head>
<body>
    <h1>🤖 LLM Data Analyzer</h1>
    <p>Uzdod jautājumu par datubāzi latviešu valodā:</p>
    <textarea id="question" placeholder="Piemēram: Cik maksājumu ir katrā valūtā?"></textarea>
    <br>
    <button onclick="askQuestion()">Jautāt</button>
    <div id="result"></div>

    <script>
        async function askQuestion() {
            const question = document.getElementById('question').value;
            const resultDiv = document.getElementById('result');
            
            if (!question) {
                resultDiv.innerHTML = '⚠️ Lūdzu ieraksti jautājumu!';
                return;
            }
            
            resultDiv.innerHTML = '<span class="loading">⏳ Apstrādā...</span>';
            
            const response = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({question: question})
            });
            
            const data = await response.json();
            resultDiv.innerHTML = data.answer;
        }
    </script>
</body>
</html>
